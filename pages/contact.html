<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/normalize.css">
    <link rel="stylesheet" href="../styles/contact.css">


    <title>Genesis Design</title>
</head>

<body>
    <div class="page-settings">
        <header class="header">
            <nav class="nav">
                <div class="logo">
                    <a href="../index.html"><img src="../images/Logo.svg" alt="logo"></a>
                </div>
                <ul class="nav__link">
                    <li class="nav__li"><a class="nav__link" href="/pages/projects.html">Projects</a></li>
                    <li class="nav__li"><a class="nav__link" href="/pages/contact.html">Contact</a></li>
                </ul>
            </nav>
        </header>

        <section class="main">
            <div class="contact__header">
                <h1 class="contact__header--header heading heading--small">
                    Full set of great features to make your product fresh
                </h1>
                <p class="contact__header--text">
                    Our favorite brands are our friends! We help them to achieve their goals, they help us to stay sharp.
                </p>
            </div>
            <div class="contact__form">
                <form action="">
                    <input type="text" class="input input__name" name="name" id="name" placeholder="Name">
                    <input type="email" class="input input__email" name="email" id="email" placeholder="Email">
                    <input type="text" class="input input__message" name="message" id="message" placeholder="Message">
                    <button type="submit" class="btn">Submit</button>
                </form>
            </div>
        </section>

        <section class-="contact__photo">
            <img src="../images/Map.png" class="contact__map">
        </section>
    
    <footer class="footer">
            <nav class="nav">
                <div class="logo">
                    <a href="../index.html"><img src="../images/logo.svg" alt="Genesis logo"></a>
                </div>
                <ul class="nav__link">
                    <li class="nav__li"><a class="nav__link" href="/pages/projects.html">Projects</a></li>
                    <li class="nav__li"><a class="nav__link" href="/pages/contact.html">Contact</a></li>
                </ul>
            </nav>
        </footer>
    </div>
</body>
</html>
